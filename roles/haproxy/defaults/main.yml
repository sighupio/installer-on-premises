---
haproxy_configuration_file: "haproxy.cfg"
haproxy_package:
  Debian:
    version: "3.2"
    name: "haproxy=3.2.*"
  Ubuntu:
    version: "3.2"
    name: "haproxy=3.2.*"
  Rocky:
    version: "32z"
    name: "haproxy32z"
  RedHat:
    name: "haproxy32z"
    version: "32z"
  AlmaLinux:
    name: "haproxy32z"
    version: "32z"
keepalived_cluster: false
keepalived_interface: "ens192"
keepalived_on_k8s_master: false
keepalived_passphrase: "12345678"
keepalived_virtual_router_id: "51"

# Repository management
# Set to true if you manage repositories externally from these playbooks
haproxy_self_managed_repositories: false
